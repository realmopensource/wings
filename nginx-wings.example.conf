# Nginx for Wings daemon (wings.stijn.wtf) — run on the VPS, NOT on your Mac.
# Your panel stays local + Cloudflare tunnel. Only Wings needs this file.
#
# Install on VPS:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   sudo cp nginx-wings.example.conf /etc/nginx/sites-available/wings.stijn.wtf
#   sudo ln -sf /etc/nginx/sites-available/wings.stijn.wtf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#
# Wings /etc/realm/config.yml:
#   api.host: 127.0.0.1
#   api.port: 8080
#   api.ssl.enabled: false
#   sudo systemctl restart wings
#
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d wings.stijn.wtf
#
# Panel node (Admin → Nodes):
#   FQDN: wings.stijn.wtf | Scheme: https | Port: 443 | Behind proxy: Yes

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name wings.stijn.wtf;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wings.stijn.wtf;

    access_log /var/log/nginx/wings.app-access.log;
    error_log  /var/log/nginx/wings.app-error.log error;

    client_max_body_size 100m;
    client_body_timeout 120s;

    sendfile off;

    ssl_certificate     /etc/letsencrypt/live/wings.stijn.wtf/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wings.stijn.wtf/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
    ssl_prefer_server_ciphers on;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
